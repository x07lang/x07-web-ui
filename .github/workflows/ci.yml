name: ci

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Host safety + snapshot
        run: bash scripts/ci/check_phase2_host_safety.sh
